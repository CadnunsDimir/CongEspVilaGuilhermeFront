<button type="button" class="button add-user-fab" aria-label="Adicionar usuário" (click)="toggleModal()">
  <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <path fill="currentColor" d="M12 5c.55 0 1 .45 1 1v5h5c.55 0 1 .45 1 1s-.45 1-1 1h-5v5c0 .55-.45 1-1 1s-1-.45-1-1v-5H6c-.55 0-1-.45-1-1s.45-1 1-1h5V6c0-.55.45-1 1-1z"/>
  </svg>
</button>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()"></div>
<div class="add-user-modal" *ngIf="showModal" role="dialog" aria-modal="true" aria-labelledby="addUserTitle" (click)="$event.stopPropagation()">
  <form class="panel" [formGroup]="userForm" (ngSubmit)="saveUser()">
    <button type="button" class="modal-close" aria-label="Fechar" (click)="closeModal()">×</button>
    <h2 id="addUserTitle">Adicionar usuário</h2>

    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email">
    </label>

    <label>
      Usuário
      <input type="text" formControlName="username" autocomplete="username">
    </label>

    <label>
      Senha inicial
      <input type="password" formControlName="password" autocomplete="new-password">
    </label>

    <button class="button" type="submit" [disabled]="userForm.invalid || savingUser">
      {{ savingUser ? 'Salvando...' : 'Salvar usuário' }}
    </button>
  </form>
</div>
